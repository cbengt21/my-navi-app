<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSM Route Finder</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <style>
        /* Map styling */
        html,
        body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        #map {
            height: 100vh;
            /* Full height of the viewport */
            width: 100%;
            /* Full width of the viewport */
        }

        /* Styling for buttons */
        .map-button {
            background-color: white;
            border: 2px solid #007bff;
            padding: 10px;
            cursor: pointer;
            margin-bottom: 10px;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
        }

        .map-button img {
            width: 24px;
            height: 24px;
        }

        /* Positioning the control buttons at the bottom-right */
        #controls {
            position: absolute;
            bottom: 20px;
            /* Distance from the bottom edge */
            left: 20px;
            /* Distance from the right edge */
            display: flex;
            flex-direction: column;
            gap: 10px;
            /* Space between buttons */
            z-index: 1000;
            /* Ensures buttons are on top of the map */
        }
    </style>
</head>

<body>
    <div id="map"></div>

    <!-- Control buttons (styled with icons) -->
    <div id="controls">
        <button class="map-button" id="routeInfoButton" title="Calculate route">
            <img src="https://img.icons8.com/ios-filled/50/000000/route.png" alt="Calculate Route">
        </button>
        <button class="map-button" id="clearRouteButton" title="Clear route">
            <img src="https://img.icons8.com/ios-filled/50/000000/delete-sign.png" alt="Clear Route">
        </button>
        <button class="map-button" id="CurrentPosButton" title="My position">
            <img src="https://img.icons8.com/ios-filled/50/000000/compass.png" alt="Toggle Position/Route">
        </button>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <!-- Leaflet Control Geocoder JS -->
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>


    <script>
        let map, userMarker;
        const zoomLevel = 13;  // Default zoom level
        let firstUpdate = true;  // Flag to check if it's the first location update
        let viewingRoute = false;  // Track toggle state for position/route
        let routeBounds;
        let currentLatLng;
        let gpsLatLng;  // Always stores the latest GPS position
        let targetLatLng;
        let geocoder; // Declare geocoder outside initMap to avoid re-adding it multiple times
        let polyline;
        let targetMarker; // Variable to store the target marker
        let startMarker;  // Marker for click-to-set start position
        let startSetByClick = false; // Track if start was set by clicking the map

        function initMap(lat, lon) {
            // Always track the latest GPS position
            gpsLatLng = L.latLng(lat, lon);

            // If user manually clicked to set start, don't overwrite currentLatLng
            if (!startSetByClick) {
                currentLatLng = L.latLng(lat, lon);
            }

            if (!map) { // Only initialize the map once
                setupMap(lat, lon);
            }

            // Add or update the user location marker:
            if (!userMarker) {
                userMarker = L.circleMarker([lat, lon], {
                    radius: 8,  // Size of the circle
                    color: "#fff",  // Border color white
                    fillColor: "#007bff",   // Fill color blue
                    fillOpacity: 1  // Transparency
                }).addTo(map).openPopup();
            } else {
                userMarker.setLatLng([lat, lon]);
            }

            // Move the map as the user moves
            if (firstUpdate) {
                map.setView([lat, lon], 13);
                firstUpdate = false;
            } else {
                map.panTo([lat, lon]);  // Smoothly move the map view
            }
        }

        function setupMap(lat, lon) {
            map = L.map('map').setView([lat, lon], zoomLevel);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
            }).addTo(map);

            // Add the Leaflet Control Geocoder (Search Box)
            geocoder = L.Control.geocoder({
                defaultMarkGeocode: false
            }).on('markgeocode', function (e) {
                targetLatLng = e.geocode.center;
                map.setView(targetLatLng, 13);
                console.log("Geocode result:", targetLatLng);

                // Remove the previous target marker if it exists
                if (targetMarker) {
                    map.removeLayer(targetMarker);
                }

                // Add marker at search location
                targetMarker = L.marker(targetLatLng).addTo(map).bindPopup('' + e.geocode.name).openPopup();
            }).addTo(map);

            // Click on map to set start position
            map.on('click', function (e) {
                const lat = e.latlng.lat;
                const lon = e.latlng.lng;
                console.log("Map clicked — setting start position:", lat, lon);

                startSetByClick = true;
                currentLatLng = L.latLng(lat, lon);

                // Remove old start marker
                if (startMarker) {
                    map.removeLayer(startMarker);
                }

                // Add a green start marker
                startMarker = L.circleMarker([lat, lon], {
                    radius: 8,
                    color: "#fff",
                    fillColor: "#28a745",
                    fillOpacity: 1
                }).addTo(map).bindPopup("Start position").openPopup();
            });
        }


        // Initialize map immediately with default position (Gothenburg)
        setupMap(57.7089, 11.9746);

        // Get user's current position using Geolocation API
        if (navigator.geolocation) {
            let watchId = null;

            function startWatching(highAccuracy) {
                // Clear any previous watcher
                if (watchId !== null) {
                    navigator.geolocation.clearWatch(watchId);
                }

                watchId = navigator.geolocation.watchPosition(
                    function (position) {
                        const lat = position.coords.latitude;
                        const lon = position.coords.longitude;
                        console.log("User position updated:", lat, lon, "(highAccuracy:", highAccuracy, ")");
                        initMap(lat, lon);
                    },
                    function (error) {
                        if (highAccuracy) {
                            console.warn("High accuracy failed, falling back to low accuracy:", error.message);
                            startWatching(false);
                        } else {
                            console.warn("Geolocation failed:", error.message);
                        }
                    },
                    {
                        enableHighAccuracy: highAccuracy,
                        maximumAge: 5000,
                        timeout: highAccuracy ? 5000 : 15000
                    }
                );
            }
            startWatching(true);
        }

        // Compass button: reset to GPS position (clear click-based start)
        document.getElementById('CurrentPosButton').addEventListener('click', function () {
            console.log("Current position button clicked.");
            startSetByClick = false; // Allow geolocation to update again
            if (startMarker) {
                map.removeLayer(startMarker);
                startMarker = null;
            }
            if (viewingRoute && routeBounds) {
                map.fitBounds(routeBounds);
            } else if (currentLatLng) {
                map.setView(currentLatLng, zoomLevel);
            }
            viewingRoute = !viewingRoute;
        });

        // Route button: calculate route between start and target
        document.getElementById('routeInfoButton').addEventListener('click', function () {
            console.log("Route button clicked.");
            if (!currentLatLng || !targetLatLng) {
                alert("Set both a start position (click map) and destination (search) first.");
                return;
            }
            routeBounds = L.latLngBounds([currentLatLng, targetLatLng]);
            sendRouteRequest();
        });

        // Clear route button: remove polyline, target marker, start marker
        document.getElementById('clearRouteButton').addEventListener('click', function () {
            console.log("Clear route button clicked.");
            if (polyline) {
                map.removeLayer(polyline);
                polyline = null;
            }
            if (targetMarker) {
                map.removeLayer(targetMarker);
                targetMarker = null;
            }
            if (startMarker) {
                map.removeLayer(startMarker);
                startMarker = null;
            }
            targetLatLng = null;
            routeBounds = null;
            startSetByClick = false;
            // Restore currentLatLng to GPS position
            if (gpsLatLng) {
                currentLatLng = gpsLatLng;
            }
            viewingRoute = false;
            console.log("Route cleared.");
        });

        // WebSocket connection:
        var ws = new WebSocket("ws://localhost:18080/ws");
        ws.onopen = () => console.log("WebSocket connected");

        // Receive messages and draw polyline
        ws.onmessage = function (event) {
            let data = JSON.parse(event.data);
            if (!data.path) {
                console.log("No path data received.");
                return;
            }
            console.log("Received route data:", data);

            // Check the format of the path data
            console.log("Path data:", data.path);

            // Map the path coordinates
            let pathCoords = data.path.map(p => [p.lat, p.lon]);
            console.log("Path coordinates:", pathCoords);

            // Remove the existing polyline if it exists
            if (polyline) {
                map.removeLayer(polyline);
                console.log("Previous polyline removed.");
            }

            // Add the polyline to the map
            polyline = L.polyline(pathCoords, { color: 'blue' }).addTo(map);

            // Show estimated travel time
            if (data.travel_time_text) {
                polyline.bindPopup("Estimated time: " + data.travel_time_text).openPopup();
            }

            // Fit the map's view to the polyline
            map.fitBounds(polyline.getBounds());
        };

        // Function to send current and target positions via WebSocket
        function sendRouteRequest() {
            if (!currentLatLng || !targetLatLng) {
                console.log("Waiting for both current and target positions...");
                return;
            }

            const message = {
                type: "route_request",
                start: { lat: currentLatLng.lat, lon: currentLatLng.lng },
                end: { lat: targetLatLng.lat, lon: targetLatLng.lng }
            };

            if (ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify(message));
                console.log("Sent route request:", message);
            } else {
                console.warn("WebSocket is not open yet.");
            }
        }


    </script>
</body>

</html>
